name: Statistics Service - CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - qa
      - "feature/**"
      - "fix/**"

env:
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ci-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw --batch-mode --no-transfer-progress clean compile
        env:
          MONGODB_URI: mongodb://localhost:27017/techcup_statistics
      - run: ./mvnw --batch-mode --no-transfer-progress test
        env:
          MONGODB_URI: mongodb://localhost:27017/techcup_statistics
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
      - name: SonarCloud
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./mvnw --batch-mode --no-transfer-progress sonar:sonar \
            -Dsonar.projectKey=TECH-CUP-2026-INT_ga-statistics-service \
            -Dsonar.organization=tech-cup-2026-int \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
      - run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests
        if: success()
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: statistics-service-jar
          path: target/*.jar
          retention-days: 14

  dockerize-publish:
    name: Build & Publish Docker Image
    needs: build-test-analyze
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set tag per branch
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=qa,enable=${{ github.ref == 'refs/heads/qa' }}
            type=ref,event=branch
            type=sha
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure
    needs: dockerize-publish
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'qa' }}
    permissions:
      contents: read
    steps:
      - name: Set target per branch
        id: target
        env:
          AZURE_WEBAPP_QA_NAME: ${{ secrets.AZURE_WEBAPP_QA_NAME }}
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            echo "APP_NAME=$AZURE_WEBAPP_QA_NAME" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=qa" >> $GITHUB_OUTPUT
          else
            echo "APP_NAME=$AZURE_WEBAPP_NAME" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          fi
      - uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ steps.target.outputs.APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.target.outputs.IMAGE_TAG }}
