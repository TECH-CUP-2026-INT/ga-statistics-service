name: Statistics Service - CI (Push)

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"

env:
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ci-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout del código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cachear paquetes de SonarQube
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar
        run: ./mvnw --batch-mode --no-transfer-progress clean compile

      - name: Ejecutar pruebas
        env:
          MONGODB_URI: mongodb://localhost:27017/techcup_statistics
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Publicar reporte de pruebas
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Publicar reporte de cobertura (JaCoCo)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Análisis con SonarCloud
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./mvnw --batch-mode --no-transfer-progress sonar:sonar \
            -Dsonar.projectKey=TECH-CUP-2026-INT_ga-statistics-service \
            -Dsonar.organization=tech-cup-2026-int \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Empaquetar aplicación
        if: success()
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Publicar artefacto JAR
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: statistics-service-jar
          path: target/*.jar
          retention-days: 14

  dockerize-publish:
    name: Build & Publish Docker Image
    needs: build-test-analyze

    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar metadatos de la imagen
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy a Azure App Service

    needs: dockerize-publish

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    environment: production

    permissions:
      contents: read

    steps:
      - name: Desplegar contenedor en Azure App Service
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ghcr.io/${{ env.IMAGE_NAME }}:latest
