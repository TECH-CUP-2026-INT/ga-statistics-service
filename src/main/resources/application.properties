spring.application.name=service-statistics

server.port=${SERVER_PORT:8085}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/techcup_statistics}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# En dev, Hibernate crea/actualiza las tablas automaticamente.
# En un entorno real usariamos migraciones (Flyway/Liquibase) y esto se pondria en "validate".
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# URL base del servicio de Torneos, usada para preguntar cual es el torneo
# activo. AJUSTAR el puerto/host cuando el equipo confirme el contrato real.
services.tournaments.base-url=${TOURNAMENTS_SERVICE_URL:http://localhost:8081}

