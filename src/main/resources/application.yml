spring:
  application:
    name: service-statistics

  rabbitmq:
    host: ${RABBITMQ_HOST:toucan.lmq.cloudamqp.com}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USER:exdntvvm}
    password: ${RABBITMQ_PASS:}
    virtual-host: ${RABBITMQ_VHOST:exdntvvm}
    ssl:
      enabled: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/techcup_statistics}

server:
  port: ${SERVER_PORT:5627}

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction2026!}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    info:
      env:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

services:
  tournaments:
    base-url: ${TOURNAMENTS_SERVICE_URL:http://localhost:8080}

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: basic

rabbitmq:
  exchange:
    techcup: techcup.exchange
  queue:
    match-events: techcup.statistics.match-events
    tournament-events: techcup.statistics.tournament-events
  routing-key:
    match-events: techcup.match.event.*
    tournament-events: techcup.tournament.event.*
