spring:
  application:
    name: service-statistics

server:
  port: ${SERVER_PORT:8085}

data:
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/techcup_statistics}

services:
  tournaments:
    base-url: ${TOURNAMENTS_SERVICE_URL:http://localhost:8080}

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: basic

rabbitmq:
  exchange:
    techcup: techcup.exchange
  queue:
    match-events: techcup.statistics.match-events
    tournament-events: techcup.statistics.tournament-events
  routing-key:
    match-events: techcup.match.event.*
    tournament-events: techcup.tournament.event.*
  host: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USER:guest}
  password: ${RABBITMQ_PASS:guest}
